<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiketKu - Sistem Jadwal Sekolah</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="custom-alert" class="modal hidden">
    <div class="modal-content">
        <div id="modal-icon">✨</div>
        <p id="modal-message">Pesan di sini...</p>
        <button onclick="closeModal()" class="btn-close">Oke, Siap! 🎀</button>
    </div>
</div>
    <div class="container">
        <header>
            <h1>🌸 Piket<span>Ku</span> 🌸</h1>
            <p>Manajemen Jadwal Kebersihan Kelas</p>
            <div class="role-switch">
                <button onclick="switchRole('admin')" id="btn-admin" class="active">Admin</button>
                <button onclick="switchRole('siswa')" id="btn-siswa">Siswa</button>
            </div>
        </header>

        <main>
            <section id="admin-panel" class="panel">
                <div class="card">
                    <h3>Tambah/Update Jadwal</h3>
                    <div class="input-group">
                        <input type="text" id="nama-siswa" placeholder="Nama Siswa...">
                        <select id="hari-piket">
                            <option value="Senin">Senin</option>
                            <option value="Selasa">Selasa</option>
                            <option value="Rabu">Rabu</option>
                            <option value="Kamis">Kamis</option>
                            <option value="Jumat">Jumat</option>
                        </select>
                        <button onclick="tambahJadwal()" class="btn-primary">Simpan Data ✨</button>
                    </div>
                </div>
            </section>

            <section id="siswa-panel" class="panel hidden">
                <div class="card">
                    <h3>Jadwal Piket Hari Ini</h3>
                    <div id="notif-area"></div>
                    <ul id="daftar-piket-hari-ini">
                        </ul>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
